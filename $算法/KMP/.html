<script>
    var str = "AAABCDDAABCA";

    function KMP_nextArr(str) {
        const len = str.length;
        var next = new Array(len);
        var kmp = 0,
            i = 1;
        next[0] = 0;

        while (i < len) {
            if (str[i] == str[kmp]) {
                kmp++;
                next[i] = kmp;
                i++;
            } else {
                if (kmp > 0) {
                    kmp = next[kmp - 1];
                } else {
                    next[i] = kmp;
                    i++;
                }
            }
        }
        return next;
    }
    console.log(KMP_nextArr(str));
</script>
