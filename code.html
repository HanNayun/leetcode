<script>
    var test = function (n) {
        let res = 0
        const ipPrimes = new Array(n + 1).fill(1)

        for (let i = 2; i <= n; i++) {
            if (ipPrimes[i] == 1) {
                res++
                for (let j = i * i; j <= n; j += i) {
                    ipPrimes[j] = 0
                }
            }
        }
        return res
    };


    //Input
    let
        par1 =
            10
    //Output
    //2
    console.log(test(
        par1
    ))
</script>
